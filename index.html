<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏰 小小梦想家 · 新生儿生长记录</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

<!-- Floating decorations -->
<div class="clouds">
  <div class="cloud"></div><div class="cloud"></div><div class="cloud"></div>
</div>
<div class="stars">
  <span class="star">✦</span><span class="star">✧</span><span class="star">✦</span>
  <span class="star">✧</span><span class="star">✦</span><span class="star">✧</span>
</div>
<div class="zootopia-bg">
  <span class="zoo-elm">🦊</span>
  <span class="zoo-elm">🐰</span>
  <span class="zoo-elm">🥕</span>
  <span class="zoo-elm">⭐</span>
  <span class="zoo-elm">🌴</span>
  <span class="zoo-elm">🦥</span>
</div>

<!-- App -->
<div class="app-container">
  <!-- Header -->
  <header class="app-header">
    <div class="header-icon">🏰</div>
    <h1 class="app-title">小小梦想家</h1>
    <p class="app-subtitle">新生儿生长记录 · Disney Magic</p>
  </header>

  <!-- Baby Info Card -->
  <div class="baby-card" id="babyCard" onclick="showBabySetup()">
    <div class="baby-avatar">👶</div>
    <div class="baby-info">
      <h3 id="babyNameDisplay">点击设置宝宝信息</h3>
      <p id="babyBirthDisplay"></p>
    </div>
    <div class="baby-age" id="babyAgeDisplay">--</div>
  </div>

  <!-- Tabs -->
  <nav class="tabs" id="tabNav">
    <button class="tab-btn active" data-tab="dashboard">
      <span class="tab-icon">📊</span>综合看板
    </button>
    <button class="tab-btn" data-tab="feeding">
      <span class="tab-icon">🍼</span>喂养
    </button>
    <button class="tab-btn" data-tab="diaper">
      <span class="tab-icon">💧</span>排便
    </button>
    <button class="tab-btn" data-tab="growth">
      <span class="tab-icon">📏</span>生长
    </button>
    <button class="tab-btn" data-tab="history">
      <span class="tab-icon">📋</span>历史
    </button>
  </nav>

  <!-- ==================== Dashboard Tab ==================== -->
  <section class="tab-content active" id="tab-dashboard">
    <!-- Today summary -->
    <div class="summary-grid" id="todaySummary"></div>

    <!-- Latest growth stats -->
    <div class="card" id="latestGrowthCard" style="display:none;">
      <div class="card-header">
        <span class="card-title"><span class="icon">📏</span>最新生长数据</span>
        <span style="font-size:12px;color:var(--text-light);" id="latestGrowthDate"></span>
      </div>
      <div class="growth-highlight" id="latestGrowthStats"></div>
    </div>

    <!-- Weight Chart -->
    <div class="card">
      <div class="card-header">
        <span class="card-title"><span class="icon">⚖️</span>体重生长曲线</span>
        <span style="font-size:11px;color:var(--text-light);">WHO标准</span>
      </div>
      <div class="chart-wrapper"><canvas id="chartWeight"></canvas></div>
      <div class="chart-legend">
        <span style="color:#E1251B;">● P97</span><span style="color:#F9A825;">● P85</span>
        <span style="color:#4CAF50;">● P50</span><span style="color:#2196F3;">● P15</span>
        <span style="color:#9C27B0;">● P3</span><span style="color:#000;">● 宝宝</span>
      </div>
    </div>

    <!-- Height Chart -->
    <div class="card">
      <div class="card-header">
        <span class="card-title"><span class="icon">📐</span>身长生长曲线</span>
        <span style="font-size:11px;color:var(--text-light);">WHO标准</span>
      </div>
      <div class="chart-wrapper"><canvas id="chartHeight"></canvas></div>
      <div class="chart-legend">
        <span style="color:#E1251B;">● P97</span><span style="color:#F9A825;">● P85</span>
        <span style="color:#4CAF50;">● P50</span><span style="color:#2196F3;">● P15</span>
        <span style="color:#9C27B0;">● P3</span><span style="color:#000;">● 宝宝</span>
      </div>
    </div>

    <!-- Head Circumference Chart -->
    <div class="card">
      <div class="card-header">
        <span class="card-title"><span class="icon">🧠</span>头围生长曲线</span>
        <span style="font-size:11px;color:var(--text-light);">WHO标准</span>
      </div>
      <div class="chart-wrapper"><canvas id="chartHead"></canvas></div>
      <div class="chart-legend">
        <span style="color:#E1251B;">● P97</span><span style="color:#F9A825;">● P85</span>
        <span style="color:#4CAF50;">● P50</span><span style="color:#2196F3;">● P15</span>
        <span style="color:#9C27B0;">● P3</span><span style="color:#000;">● 宝宝</span>
      </div>
    </div>
  </section>

  <!-- ==================== Feeding Tab ==================== -->
  <section class="tab-content" id="tab-feeding">
    <div class="card">
      <div class="card-header">
        <span class="card-title"><span class="icon">🍼</span>记录喂养</span>
      </div>
      <div class="form-group">
        <label class="form-label">⏰ 时间</label>
        <input type="datetime-local" class="form-input" id="feedingTime">
      </div>
      <div class="form-group">
        <label class="form-label">🥛 类型</label>
        <div class="type-toggle" id="feedingTypeToggle">
          <button class="type-btn active" data-type="breast">🤱 母乳</button>
          <button class="type-btn" data-type="formula">🍼 配方奶</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">💧 奶量 (毫升/ml)</label>
        <input type="number" class="form-input" id="feedingAmount" placeholder="例如：120" min="0" max="500" step="5">
      </div>
      <div class="form-group">
        <label class="form-label">📝 备注</label>
        <textarea class="form-textarea" id="feedingNotes" placeholder="例如：如何安抚 / 多久吃完 / 拍嗝情况..."></textarea>
      </div>
      <button class="btn btn-primary" onclick="saveFeeding()">✨ 记录喂养</button>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title"><span class="icon">📋</span>今日喂养记录</span>
        <span style="font-size:12px;color:var(--text-light);" id="todayFeedingTotal"></span>
      </div>
      <div class="record-list" id="feedingList"></div>
    </div>
  </section>

  <!-- ==================== Diaper Tab ==================== -->
  <section class="tab-content" id="tab-diaper">
    <div class="card">
      <div class="card-header">
        <span class="card-title"><span class="icon">💧</span>记录排便</span>
      </div>
      <div class="form-group">
        <label class="form-label">⏰ 时间</label>
        <input type="datetime-local" class="form-input" id="diaperTime">
      </div>
      <div class="form-group">
        <label class="form-label">🚽 类型</label>
        <div class="type-toggle" id="diaperTypeToggle">
          <button class="type-btn active" data-type="pee">💧 小便</button>
          <button class="type-btn" data-type="poop">💩 大便</button>
          <button class="type-btn" data-type="both">💧💩 都有</button>
        </div>
      </div>
      <button class="btn btn-primary" onclick="saveDiaper()">✨ 记录排便</button>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title"><span class="icon">📋</span>今日排便记录</span>
        <span style="font-size:12px;color:var(--text-light);" id="todayDiaperTotal"></span>
      </div>
      <div class="record-list" id="diaperList"></div>
    </div>
  </section>

  <!-- ==================== Growth Tab ==================== -->
  <section class="tab-content" id="tab-growth">
    <div class="card">
      <div class="card-header">
        <span class="card-title"><span class="icon">📏</span>记录生长数据</span>
      </div>
      <div class="form-group">
        <label class="form-label">📅 测量日期</label>
        <input type="date" class="form-input" id="growthDate">
      </div>
      <div class="form-group">
        <label class="form-label">⚖️ 体重 (公斤/kg)</label>
        <input type="number" class="form-input" id="growthWeight" placeholder="例如：5.2" min="1" max="20" step="0.01">
      </div>
      <div class="form-group">
        <label class="form-label">📐 身长 (厘米/cm)</label>
        <input type="number" class="form-input" id="growthHeight" placeholder="例如：58.5" min="30" max="120" step="0.1">
      </div>
      <div class="form-group">
        <label class="form-label">🧠 头围 (厘米/cm)</label>
        <input type="number" class="form-input" id="growthHead" placeholder="例如：38.0" min="25" max="55" step="0.1">
      </div>
      <button class="btn btn-primary" onclick="saveGrowth()">✨ 记录生长数据</button>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title"><span class="icon">📋</span>生长记录</span>
      </div>
      <div class="record-list" id="growthList"></div>
    </div>
  </section>

  <!-- ==================== History Tab ==================== -->
  <section class="tab-content" id="tab-history">
    <div class="card">
      <div class="card-header">
        <span class="card-title"><span class="icon">📋</span>历史记录</span>
      </div>
      <div class="filter-bar">
        <select class="form-select" id="historyType" onchange="renderHistory()" style="flex:1;">
          <option value="all">全部类型</option>
          <option value="feeding">🍼 喂养</option>
          <option value="diaper">💧 排便</option>
          <option value="growth">📏 生长</option>
        </select>
        <input type="date" class="form-input" id="historyDateFrom" onchange="renderHistory()" style="flex:1;">
        <input type="date" class="form-input" id="historyDateTo" onchange="renderHistory()" style="flex:1;">
      </div>
      <div class="record-list" id="historyList" style="max-height:500px;"></div>
    </div>
  </section>
</div>

<!-- Modal overlay -->
<div id="modalOverlay" class="modal-overlay" style="display:none;"></div>

<script src="app.js"></script>
</body>
</html>
